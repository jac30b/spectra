# Spectra tracer configuration
# PID to trace directly (0 = disabled when process_name is set, or trace all when it is empty)
pid: 0

# process_name is a regular expression matched against the full cmdline of each process; all matches are traced
process_name: ".*tinygrad.*"

# Array of tracepoints to enable
tracepoints:
  - futex
  - sched_switch
  - page_fault_user
  - ioctl
  - mmap
  - clone3
  - openat
  - cuda

# Optional override for libcuda path used by CUDA uprobe/uretprobe tracing.
# lib_cuda_path: "/usr/lib/x86_64-linux-gnu/libcuda.so.1"

# Enable automatic process discovery via SPECTRA environment variable
# When enabled, spectra will monitor all process executions and automatically
# start tracing any process that has the SPECTRA environment variable set
enable_process_monitor: true
  
