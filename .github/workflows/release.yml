name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          
      - name: Install eBPF dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev
        
      - name: Build
        run: make all
        
      - name: Create Zip Archive
        run: zip spectra-linux-amd64.zip spectra
          
      - name: Generate Release Tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: spectra-linux-amd64.zip
          generate_release_notes: true
